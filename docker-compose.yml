services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: >
      sh -lc "until php artisan migrate --seed --force; do echo 'Esperando Postgres...'; sleep 2; done
      && php artisan serve --host=0.0.0.0 --port=8080"
    ports:
      - "8080:8080"
    volumes:
      - ./:/var/www/html
    depends_on:
      - postgres
    env_file:
      - .env

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: >
      sh -lc "until php artisan about >/dev/null 2>&1; do echo 'Esperando Postgres...'; sleep 2; done
      && php artisan queue:work database --sleep=1 --tries=1 --timeout=0"
    volumes:
      - ./:/var/www/html
    depends_on:
      - postgres
    env_file:
      - .env

  node:
    image: node:22
    working_dir: /var/www/html
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: voice_demo
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: laravel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
